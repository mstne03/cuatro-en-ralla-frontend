<div style="min-height:100vh;display:flex;flex-direction:column;align-items:center;padding:16px;gap:16px">

  <!-- Header -->
  <div style="width:100%;max-width:600px;display:flex;justify-content:space-between;align-items:center;padding-bottom:12px;border-bottom:1px solid var(--border)">
    <div style="display:flex;align-items:center;gap:10px">
      <span style="font-size:20px">🔴🟡</span>
      <span style="font-weight:800;font-size:18px">4 en Ralla</span>
    </div>
    <button class="btn-ghost" (click)="backToLobby()" style="padding:8px 16px;font-size:14px">← Lobby</button>
  </div>

  <!-- Status badge -->
  <div style="
    padding:10px 24px;
    border-radius:999px;
    font-weight:700;
    font-size:15px;
    text-align:center;
    background:{{
      gameState === 'finished' ? 'rgba(59,130,246,0.15)' :
      waitingForOpponent ? 'rgba(148,163,184,0.1)' :
      myRole === currentTurn ? 'rgba(16,185,129,0.15)' : 'rgba(234,179,8,0.1)'
    }};
    border: 1px solid {{
      gameState === 'finished' ? 'rgba(59,130,246,0.3)' :
      waitingForOpponent ? 'var(--border)' :
      myRole === currentTurn ? 'rgba(16,185,129,0.3)' : 'rgba(234,179,8,0.3)'
    }};
    color:{{
      gameState === 'finished' ? '#93c5fd' :
      waitingForOpponent ? 'var(--text-muted)' :
      myRole === currentTurn ? '#6ee7b7' : '#fde68a'
    }}
  ">
    {{ statusMessage }}
  </div>

  <!-- Share link panel -->
  @if (waitingForOpponent) {
    <div class="card" style="width:100%;max-width:480px;padding:20px">
      <p style="font-size:13px;font-weight:600;color:var(--text-muted);margin-bottom:10px;text-transform:uppercase;letter-spacing:0.05em">Comparte con tu rival</p>
      <div style="display:flex;gap:8px">
        <input readonly [value]="gameUrl" style="font-size:12px;color:var(--text-muted)" />
        <button class="btn-primary" (click)="copyLink()" style="flex-shrink:0;padding:12px 16px">
          Copiar
        </button>
      </div>
    </div>
  }

  <!-- Board -->
  <app-board
    [grid]="grid"
    [myRole]="myRole"
    [currentTurn]="currentTurn"
    [gameOver]="gameState === 'finished' || waitingForOpponent"
    (columnClicked)="onColumnClicked($event)"
  />

  <!-- Player info -->
  @if (!waitingForOpponent) {
    <div style="display:flex;gap:20px;font-size:14px;color:var(--text-muted)">
      <div style="display:flex;align-items:center;gap:6px">
        <span style="width:12px;height:12px;border-radius:50%;background:#ef4444;display:inline-block"></span>
        <span [style.color]="myRole === 'player1' ? '#f1f5f9' : 'var(--text-muted)'"
              [style.font-weight]="myRole === 'player1' ? '700' : '400'">
          Rojo{{ myRole === 'player1' ? ' (tú)' : '' }}
        </span>
      </div>
      <div style="display:flex;align-items:center;gap:6px">
        <span style="width:12px;height:12px;border-radius:50%;background:#eab308;display:inline-block"></span>
        <span [style.color]="myRole === 'player2' ? '#f1f5f9' : 'var(--text-muted)'"
              [style.font-weight]="myRole === 'player2' ? '700' : '400'">
          Amarillo{{ myRole === 'player2' ? ' (tú)' : '' }}
        </span>
      </div>
    </div>
  }

  <!-- Back to lobby button when finished -->
  @if (gameState === 'finished') {
    <button class="btn-primary" (click)="backToLobby()" style="padding:14px 32px;font-size:16px;border-radius:var(--radius)">
      Volver al lobby
    </button>
  }

</div>
