<div style="min-height:100vh;display:flex;align-items:center;justify-content:center;padding:16px">
  <div class="card" style="width:100%;max-width:400px">

    <div style="text-align:center;margin-bottom:32px">
      <div style="font-size:48px;margin-bottom:8px">🔴🟡</div>
      <h1 style="font-size:28px;font-weight:800;letter-spacing:-0.5px">4 en Ralla</h1>
      <p style="color:var(--text-muted);margin-top:4px">
        {{ isRegistering ? 'Crea tu cuenta' : 'Bienvenido de vuelta' }}
      </p>
    </div>

    @if (error) {
      <div class="error-box" style="margin-bottom:20px">{{ error }}</div>
    }

    <div style="display:flex;flex-direction:column;gap:12px">
      <input
        [(ngModel)]="email"
        type="email"
        placeholder="Correo electrónico"
        (keyup.enter)="submitEmail()"
      />
      <input
        [(ngModel)]="password"
        type="password"
        placeholder="Contraseña"
        (keyup.enter)="submitEmail()"
      />
      <button class="btn-primary" (click)="submitEmail()" style="width:100%;margin-top:4px">
        {{ isRegistering ? 'Crear cuenta' : 'Entrar' }}
      </button>
    </div>

    <p
      style="text-align:center;margin-top:20px;color:var(--text-muted);font-size:14px;cursor:pointer"
      (click)="isRegistering = !isRegistering"
    >
      {{ isRegistering ? '¿Ya tienes cuenta?' : '¿No tienes cuenta?' }}
      <span style="color:var(--primary);font-weight:600">
        {{ isRegistering ? ' Inicia sesión' : ' Regístrate' }}
      </span>
    </p>
  </div>
</div>
