<div style="max-width:400px;margin:80px auto;padding:32px;border:1px solid #ddd;border-radius:8px;font-family:sans-serif">
  <h1 style="text-align:center;margin-bottom:24px">4 en Ralla</h1>
  <h2 style="text-align:center;color:#555;margin-bottom:32px">
    {{ isRegistering ? 'Crear cuenta' : 'Iniciar sesión' }}
  </h2>

  @if (error) {
    <div style="color:red;margin-bottom:16px;padding:8px;background:#fff0f0;border-radius:4px">
      {{ error }}
    </div>
  }

  <div style="display:flex;flex-direction:column;gap:12px">
    <input
      [(ngModel)]="email"
      type="email"
      placeholder="Correo electrónico"
      style="padding:10px;border:1px solid #ccc;border-radius:4px;font-size:16px"
    />
    <input
      [(ngModel)]="password"
      type="password"
      placeholder="Contraseña"
      style="padding:10px;border:1px solid #ccc;border-radius:4px;font-size:16px"
    />
    <button
      (click)="submitEmail()"
      style="padding:12px;background:#3b82f6;color:white;border:none;border-radius:4px;font-size:16px;cursor:pointer"
    >
      {{ isRegistering ? 'Registrarse' : 'Entrar' }}
    </button>

    <p style="text-align:center;color:#666;cursor:pointer" (click)="isRegistering = !isRegistering">
      {{ isRegistering ? '¿Ya tienes cuenta? Inicia sesión' : '¿No tienes cuenta? Regístrate' }}
    </p>
  </div>
</div>
