<div style="display:inline-block;background:#1e3a5f;padding:16px;border-radius:8px">
  <div style="display:flex;gap:8px">
    @for (ci of cols(); track ci) {
      <div
        (click)="onColumnClick(ci)"
        [style.cursor]="isMyTurn ? 'pointer' : 'not-allowed'"
        style="display:flex;flex-direction:column;gap:8px"
      >
        @for (row of grid; track $index) {
          <div
            [style.background]="cellColor(row[ci])"
            style="width:64px;height:64px;border-radius:50%;transition:background 0.15s"
          ></div>
        }
      </div>
    }
  </div>
</div>
