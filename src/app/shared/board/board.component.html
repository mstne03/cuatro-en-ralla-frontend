<div class="board-wrap">
  <div class="board">
    @for (ci of cols(); track ci) {
      <div
        class="col"
        (click)="onColumnClick(ci)"
        [class.col--active]="isMyTurn"
      >
        @for (row of grid; track $index) {
          <div
            class="cell"
            [class.cell--p1]="row[ci] === 'player1'"
            [class.cell--p2]="row[ci] === 'player2'"
          ></div>
        }
      </div>
    }
  </div>
</div>
